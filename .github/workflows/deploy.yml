name: Deploy mdbook to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MDBOOK_VERSION: 0.5.2
      MDBOOK_SHA256: 084e4342ba564db270108763e404a7d1f309d932651a22484e93c0dc1a071f6d
    steps:
      - uses: actions/checkout@v4

      - name: Install mdbook (pinned and verified)
        run: |
          curl --fail --location --silent --show-error \
            "https://github.com/rust-lang/mdBook/releases/download/v${MDBOOK_VERSION}/mdbook-v${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            --output /tmp/mdbook.tar.gz
          printf "%s  %s\n" "$MDBOOK_SHA256" "/tmp/mdbook.tar.gz" | sha256sum --check --strict --status
          tar -xzf /tmp/mdbook.tar.gz -C /tmp
          install -m 0755 /tmp/mdbook /usr/local/bin/mdbook

      - name: Build book
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
